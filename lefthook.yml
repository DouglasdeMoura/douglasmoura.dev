pre-commit:
  parallel: true
  jobs:
    - name: ultracite fix
      glob: "*.{js,ts,jsx,tsx,mjs,mts,cjs,cts}"
      run: pnpm exec ultracite fix {staged_files}
      stage_fixed: true

    - name: update post timestamps
      glob: "content/posts/**/*.md"
      run: |
        NOW=$(date -u +"%Y-%m-%d %H:%M:%S.000Z")
        for f in {staged_files}; do
          sed -i "s/^updated:.*$/updated: $NOW/" "$f"
        done
      stage_fixed: true

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: pnpm tsc --noEmit

    - name: i18n check
      glob: "*.{ts,tsx}"
      run: pnpm cli i18n extract --check
