pre-commit:
  parallel: true
  jobs:
    - name: ultracite fix
      glob: "*.{js,ts,jsx,tsx,mjs,mts,cjs,cts}"
      run: pnpm exec ultracite fix {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: pnpm tsc --noEmit

    - name: i18n check
      glob: "*.{ts,tsx}"
      run: pnpm cli i18n extract --check
